services:
  ao-analytics-certbot:
    container_name: ao-analytics-certbot
    image: certbot/certbot:latest
    environment:
      - CERTBOT_DOMAINS=staging.veqox.dedyn.io,api.veqox.dedyn.io
      - CERTBOT_EMAIL=veqoxao@gmail.com
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command:
      [
        "certonly",
        "-n",
        "--agree-tos",
        "--email",
        "$$CERTBOT_EMAIL",
        "--webroot",
        "--webroot-path",
        "/var/www/certbot",
        "-d",
        "$$CERTBOT_DOMAINS",
        "--staging",
      ]
    depends_on:
      - ao-analytics-nginx

  ao-analytics-nginx:
    container_name: ao-analytics-nginx
    image: nginx:latest
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/conf:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - ao-analytics-api
      - ao-analytics-frontend

  ao-analytics-db:
    container_name: ao-analytics-db
    image: ghcr.io/ao-analytics/ao-analytics-db:latest
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=ao
    restart: unless-stopped
    #ports:
    #  - 5432:5432
    volumes:
      - ./data:/var/lib/postgresql/data/

  ao-analytics-migrator:
    container_name: ao-analytics-migrator
    image: ghcr.io/ao-analytics/ao-analytics-migrator:latest
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@ao-analytics-db:5432/ao
      - LOCATIONS_PATH=data/locations.json
      - ITEMS_PATH=data/items.json
      - LOCALIZATIONS_PATH=data/localizations.json
    volumes:
      - ./migrator:/data
    restart: no
    depends_on:
      - ao-analytics-db

  ao-analytics-nats:
    container_name: ao-analytics-nats
    image: ghcr.io/ao-analytics/ao-analytics-nats:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@ao-analytics-db:5432/ao
      - NATS_URL=nats://public:thenewalbiondata@nats.albion-online-data.com:34222
      - NATS_SUBJECT=marketorders.deduped
      - NATS_USER=public
      - NATS_PASSWORD=thenewalbiondata
    depends_on:
      - ao-analytics-db

  ao-analytics-api:
    container_name: ao-analytics-api
    image: ghcr.io/ao-analytics/ao-analytics-api:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@ao-analytics-db:5432/ao
      - PORT=8080
    depends_on:
      - ao-analytics-db

  ao-analytics-frontend:
    container_name: ao-analytics-frontend
    image: ghcr.io/ao-analytics/ao-analytics-frontend:latest
    environment:
      - HOST=0.0.0.0
      - PORT=80
      - PUBLIC_BACKEND_URL=https://api.veqox.dedyn.io
      - PUBLIC_INTERNAL_URL=http://ao-analytics-api
    restart: unless-stopped
    depends_on:
      - ao-analytics-api
